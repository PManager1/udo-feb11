        // Create Markers and save them to the array
        locations.forEach(location => {
          const marker = new google.maps.Marker({
            position: location.pos,
            map: map,
            type: location.type, // Custom property to help filtering
            icon: {
              url: iconConfig[location.type],
              scaledSize: new google.maps.Size(30, 30),
              anchor: new google.maps.Point(15, 15),
              labelOrigin: new google.maps.Point(15, 40)
            },
            // label: {
            //   text: location.label,
            //   className: "map-label"
            // }
          });
          allMarkers.push(marker);
        });

        // Add Event Listeners to Checkboxes
        document.querySelectorAll('.filter-option input').forEach(checkbox => {
          checkbox.addEventListener('change', filterMarkers);
        });
      }

      function filterMarkers() {
        // Find which boxes are checked
        const activeTypes = Array.from(document.querySelectorAll('.filter-option input:checked'))
                                 .map(cb => cb.value);

        // Loop through markers and show/hide
        allMarkers.forEach(marker => {
          if (activeTypes.includes(marker.type)) {
            marker.setMap(map); // Show
          } else {
            marker.setMap(null); // Hide
          }
        });
      }

      function loadGoogleMaps() {
        const script = document.createElement('script');
        script.src = 'https://maps.googleapis.com/maps/api/js?key=' + GOOGLE_MAPS_API_KEY + '&callback=initMap';
        script.async = true;
        document.head.appendChild(script);
      }

      window.addEventListener('DOMContentLoaded', loadGoogleMaps);
