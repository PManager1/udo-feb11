<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="UDO - Restaurant Menu Management"/>
  <title>UDO - Restaurant Menu Management</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2270%22 font-family=%22Arial, sans-serif%22 font-weight=%22900%22 letter-spacing=%22-2%22><tspan fill=%22%23f97316%22>U</tspan><tspan fill=%23000000%22>DO</tspan></text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="min-h-screen antialiased text-gray-900" style="font-family: 'Nunito', sans-serif; background-color: #f9f7f5;">

  <!-- Top Header -->
  <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200 shadow-sm">
    <a href="../index.html" class="absolute left-12 top-1/2 -translate-y-1/2 z-[60] hover:opacity-90 transition text-4xl font-bold">
      <span class="text-orange-500">U <span class="-mx-1"></span>-</span><span class="text-gray-800">DO</span>
    </a>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
      <div class="w-48 hidden lg:block"></div>
      <div class="flex-1">
        <h1 class="text-2xl font-bold text-gray-900">Restaurant Menu Management</h1>
      </div>
      <div class="flex items-center gap-4">
        <span class="text-sm text-gray-500 hidden sm:block">Manage your menu items, categories, and modifiers</span>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div id="dashboardContainer">
      <!-- Dashboard content will be rendered here -->
    </div>
  </main>

  <!-- Drawer Overlay -->
  <div id="drawerOverlay" class="fixed inset-0 bg-black/50 z-50 hidden"></div>

  <!-- Item Drawer (Slide-in from right) -->
  <div id="itemDrawer" class="fixed top-0 right-0 h-full w-full sm:w-[480px] bg-white shadow-2xl z-50 transform translate-x-full overflow-y-auto">
    <div class="p-6 drawer-content">
      <!-- Item drawer content will be rendered here -->
    </div>
  </div>

  <!-- Category Drawer (Slide-in from right) -->
  <div id="categoryDrawer" class="fixed top-0 right-0 h-full w-full sm:w-[480px] bg-white shadow-2xl z-50 transform translate-x-full overflow-y-auto">
    <div class="p-6 drawer-content">
      <!-- Category drawer content will be rendered here -->
    </div>
  </div>

  <!-- Modal Overlay -->
  <div id="modalOverlay" class="fixed inset-0 bg-black/50 z-50 hidden modal-backdrop"></div>

  <!-- Modifier Group Modal -->
  <div id="modifierModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
      <div class="p-6">
        <!-- Modifier group modal content will be rendered here -->
      </div>
    </div>
  </div>

  <!-- Load JavaScript files in correct order -->
  <script src="js/demo-data.js"></script>
  <script src="js/data-manager.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/ui-components.js"></script>
  <script src="js/event-handlers.js"></script>

</body>
</html>
