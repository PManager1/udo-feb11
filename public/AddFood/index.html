<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="UDO - Restaurant Menu Management"/>
  <title>UDO - Restaurant Menu Management</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2270%22 font-family=%22Arial, sans-serif%22 font-weight=%22900%22 letter-spacing=%22-2%22><tspan fill=%22%23f97316%22>U</tspan><tspan fill=%22%23000000%22>DO</tspan></text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/config.js"></script>
  <style>
    body {
      background-color: #f9f7f5;
      font-family: 'Nunito', sans-serif;
    }
    .fade-in {
      animation: fadeIn 0.3s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .slide-in-right {
      animation: slideInRight 0.3s ease-out;
    }
    @keyframes slideInRight {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }
    .drawer-overlay {
      background-color: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
    }
    .category-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
    }
    .item-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
    }
    .availability-toggle {
      transition: all 0.2s ease;
    }
    .availability-toggle.available {
      background-color: #10b981;
    }
    .availability-toggle.unavailable {
      background-color: #ef4444;
    }
    .profit-highlight {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    }
  </style>
</head>

<body class="min-h-screen antialiased text-gray-900">

  <!-- Top Search Bar -->
  <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200 shadow-sm">
    <a href="../index.html" class="absolute left-12 top-1/2 -translate-y-1/2 z-[60] hover:opacity-90 transition text-4xl font-bold">
      <span class="text-orange-500">U <span class="-mx-1"></span>-</span><span class="text-gray-800">DO</span>
    </a>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex items-center justify-between gap-4">
      <div class="w-48 hidden lg:block"></div>
      <div class="flex-1 max-w-3xl">
        <div class="relative">
          <input
            id="searchInput"
            type="text"
            placeholder="Search menu items..."
            class="w-full pl-5 pr-12 py-3.5 bg-[#DADAD3] border border-gray-300 rounded-full text-base focus:outline-none focus:ring-2 focus:ring-gray-400/50 transition shadow-sm"
          />
          <button class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </button>
        </div>
      </div>
      <div class="flex items-center gap-6">
        <!-- Sync Status Indicator -->
        <div id="syncStatus" class="flex items-center gap-2 px-3 py-1.5 rounded-full text-sm font-medium bg-gray-100 text-gray-600">
          <div class="w-2 h-2 rounded-full bg-gray-400"></div>
          <span id="syncStatusText">Checking...</span>
        </div>
        <span class="text-sm text-gray-600">UDO: 15% commission</span>
        <a href="../login/" class="text-gray-700 hover:text-orange-500 font-medium text-base transition">Sign out</a>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Dashboard View -->
    <div id="dashboardView">
      <div class="flex flex-col sm:flex-row sm:justify-between items-start sm:items-center mb-8 gap-4">
        <div>
          <h1 class="text-3xl font-bold text-gray-900">Restaurant Menu</h1>
          <p class="text-gray-600 mt-1">Manage your menu items and modifiers</p>
        </div>
        <div class="flex flex-col sm:flex-row gap-3 w-full sm:w-auto">
          <button
            onclick="openCategoryModal()"
            class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 px-6 rounded-full text-lg transition duration-300 shadow-sm hover:shadow-md flex items-center gap-2"
          >
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            Add Category
          </button>
          <button
            onclick="openItemDrawer()"
            class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-6 rounded-full text-lg transition duration-300 shadow-sm hover:shadow-md flex items-center gap-2"
          >
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            Add New Item
          </button>
        </div>
      </div>

      <!-- Categories Grid -->
      <div id="categoriesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
        <!-- Categories will be rendered here -->
      </div>
    </div>

    <!-- Category Detail View (Hidden by default) -->
    <div id="categoryDetailView" class="hidden">
      <button onclick="showDashboard()" class="mb-6 flex items-center gap-2 text-gray-600 hover:text-orange-500 font-medium transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
        Back to Dashboard
      </button>

      <div class="flex justify-between items-center mb-6">
        <div>
          <h1 id="categoryTitle" class="text-3xl font-bold text-gray-900"></h1>
          <p id="categoryDescription" class="text-gray-600 mt-1"></p>
        </div>
        <div class="flex gap-3">
          <button
            onclick="openCategoryModal()"
            class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2 px-4 rounded-lg transition"
          >
            Manage Category
          </button>
          <button
            onclick="openItemDrawer()"
            class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-4 rounded-lg transition"
          >
            Add Item
          </button>
        </div>
      </div>

      <!-- Items Grid -->
      <div id="itemsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Items will be rendered here -->
      </div>
    </div>
  </main>

  <!-- Item Drawer Overlay -->
  <div id="itemDrawerOverlay" class="fixed inset-0 drawer-overlay z-[100] hidden" onclick="closeItemDrawer()"></div>

  <!-- Item Drawer -->
  <div id="itemDrawer" class="fixed top-0 right-0 h-full w-full max-w-2xl bg-white shadow-2xl z-[110] overflow-y-auto transform translate-x-full transition-transform duration-300">
    <div class="p-6">
      <div class="flex justify-between items-center mb-6">
        <h2 id="drawerTitle" class="text-2xl font-bold text-gray-900">Add New Item</h2>
        <button onclick="closeItemDrawer()" class="text-gray-400 hover:text-gray-600 transition">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <form id="itemForm" class="space-y-6">
        <!-- Photo Upload Section -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Food Image</label>
          <div class="border-2 border-dashed border-gray-300 rounded-xl p-6 bg-gray-50">
            <div class="flex flex-col gap-3">
              <div class="flex gap-3">
                <label class="flex-1 cursor-pointer">
                  <input type="file" accept="image/*" onchange="handleFileUpload(event)" class="hidden">
                  <div class="flex flex-col items-center justify-center p-4 bg-white border border-gray-200 rounded-lg hover:border-orange-400 transition">
                    <svg class="w-8 h-8 text-orange-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0016.07 6H17a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                    </svg>
                    <span class="text-sm font-medium text-gray-700">Upload File</span>
                  </div>
                </label>
                <label class="flex-1 cursor-pointer">
                  <input type="url" id="imageUrlInput" onchange="handleImageUrl(event)" class="hidden">
                  <div class="flex flex-col items-center justify-center p-4 bg-white border border-gray-200 rounded-lg hover:border-orange-400 transition">
                    <svg class="w-8 h-8 text-orange-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                    </svg>
                    <span class="text-sm font-medium text-gray-700">Image URL</span>
                  </div>
                </label>
                <label class="flex-1 cursor-pointer">
                  <input type="button" onclick="usePlaceholderImage()" class="hidden">
                  <div class="flex flex-col items-center justify-center p-4 bg-white border border-gray-200 rounded-lg hover:border-orange-400 transition">
                    <svg class="w-8 h-8 text-orange-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <span class="text-sm font-medium text-gray-700">Placeholder</span>
                  </div>
                </label>
              </div>

              <!-- Image Preview -->
              <div id="imagePreviewContainer" class="hidden">
                <div class="relative">
                  <img id="imagePreview" class="w-full h-48 object-cover rounded-lg" src="" alt="Preview">
                  <button type="button" onclick="clearImage()" class="absolute top-2 right-2 bg-white rounded-full p-1 shadow-md hover:bg-gray-100 transition">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Item Details -->
        <div>
          <label for="itemName" class="block text-sm font-semibold text-gray-700 mb-2">Item Name</label>
          <input
            type="text"
            id="itemName"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 transition"
            placeholder="e.g., Chicken Burger"
          />
        </div>

        <div>
          <label for="itemCategory" class="block text-sm font-semibold text-gray-700 mb-2">Category</label>
          <select
            id="itemCategory"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 transition"
          >
            <!-- Categories will be populated -->
          </select>
        </div>

        <div>
          <label for="itemPrice" class="block text-sm font-semibold text-gray-700 mb-2">Base Price ($)</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 font-semibold">$</span>
            <input
              type="number"
              id="itemPrice"
              required
              step="0.01"
              min="0"
              oninput="updateProfitCalculator()"
              class="w-full pl-8 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 transition"
              placeholder="12.99"
            />
          </div>
          <!-- Profit Calculator -->
          <div id="profitCalculator" class="mt-3 profit-highlight text-white rounded-lg p-4">
            <div class="flex justify-between items-center">
              <div>
                <p class="text-sm font-medium opacity-90">You take home on UDO:</p>
                <p id="profitAmount" class="text-2xl font-bold">$0.00</p>
              </div>
              <div class="text-right">
                <p class="text-sm font-medium opacity-90">vs. competitor (30%):</p>
                <p id="competitorProfit" class="text-lg font-semibold">$0.00</p>
                <p id="savingsAmount" class="text-sm font-medium">Save $0.00 per order!</p>
              </div>
            </div>
          </div>
        </div>

        <div>
          <label for="itemDescription" class="block text-sm font-semibold text-gray-700 mb-2">Description</label>
          <textarea
            id="itemDescription"
            rows="3"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 transition resize-none"
            placeholder="Short description of the item..."
          ></textarea>
        </div>

        <!-- Modifier Groups -->
        <div>
          <div class="flex justify-between items-center mb-3">
            <label class="block text-sm font-semibold text-gray-700">Modifier Groups (Inherited from Category)</label>
            <button type="button" onclick="openModifierGroupModal()" class="text-orange-500 hover:text-orange-600 font-medium text-sm transition">
              + Create New Group
            </button>
          </div>
          <div id="modifierGroupsList" class="space-y-3">
            <!-- Modifier groups will be rendered here -->
          </div>
        </div>

        <!-- Form Actions -->
        <div class="flex gap-3 pt-4">
          <button
            type="button"
            onclick="closeItemDrawer()"
            class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-3 px-6 rounded-lg transition"
          >
            Cancel
          </button>
          <button
            type="submit"
            class="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-6 rounded-lg transition"
          >
            Save Item
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Category Modal Overlay -->
  <div id="categoryModalOverlay" class="fixed inset-0 drawer-overlay z-[100] hidden" onclick="closeCategoryModal()"></div>

  <!-- Category Modal -->
  <div id="categoryModal" class="fixed inset-0 flex items-center justify-center z-[110] hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 overflow-hidden">
      <div class="p-6 border-b border-gray-200">
        <div class="flex justify-between items-center">
          <h2 class="text-xl font-bold text-gray-900">Manage Category</h2>
          <button onclick="closeCategoryModal()" class="text-gray-400 hover:text-gray-600 transition">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>

      <div class="p-6 space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Category Name</label>
          <input
            type="text"
            id="categoryName"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 transition"
            placeholder="e.g., Burgers"
          />
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Description</label>
          <textarea
            id="categoryDescription"
            rows="2"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 transition resize-none"
            placeholder="Brief description of the category..."
          ></textarea>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-3">Category-Wide Modifier Groups</label>
          <div id="categoryModifierGroups" class="space-y-2 max-h-48 overflow-y-auto">
            <!-- Available modifier groups will be rendered here -->
          </div>
        </div>
      </div>

      <div class="p-6 bg-gray-50 border-t border-gray-200">
        <button
          onclick="saveCategory()"
          class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-6 rounded-lg transition"
        >
          Save Changes
        </button>
      </div>
    </div>
  </div>

  <!-- Modifier Group Modal Overlay -->
  <div id="modifierModalOverlay" class="fixed inset-0 drawer-overlay z-[100] hidden" onclick="closeModifierGroupModal()"></div>

  <!-- Modifier Group Modal -->
  <div id="modifierModal" class="fixed inset-0 flex items-center justify-center z-[110] hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl mx-4 overflow-hidden max-h-[90vh] overflow-y-auto">
      <div class="p-6 border-b border-gray-200 sticky top-0 bg-white z-10">
        <div class="flex justify-between items-center">
          <h2 id="modifierModalTitle" class="text-xl font-bold text-gray-900">Create Modifier Group</h2>
          <button onclick="closeModifierGroupModal()" class="text-gray-400 hover:text-gray-600 transition">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>

      <div class="p-6 space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Group Name</label>
          <input
            type="text"
            id="modifierGroupName"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 transition"
            placeholder="e.g., Burger Sides"
          />
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Selection Rules</label>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs text-gray-600 mb-1">Min Selection</label>
              <input
                type="number"
                id="modifierMinSelection"
                min="0"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 transition"
                placeholder="0"
              />
            </div>
            <div>
              <label class="block text-xs text-gray-600 mb-1">Max Selection</label>
              <input
                type="number"
                id="modifierMaxSelection"
                min="1"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 transition"
                placeholder="1"
              />
            </div>
          </div>
          <div class="mt-2">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" id="modifierRequired" class="w-4 h-4 text-orange-500 border-gray-300 rounded focus:ring-orange-500">
              <span class="text-sm font-medium text-gray-700">Required selection</span>
            </label>
          </div>
        </div>

        <div>
          <div class="flex justify-between items-center mb-3">
            <label class="block text-sm font-semibold text-gray-700">Options</label>
            <button type="button" onclick="addModifierOption()" class="text-orange-500 hover:text-orange-600 font-medium text-sm transition">
              + Add Option
            </button>
          </div>
          <div id="modifierOptionsList" class="space-y-2">
            <!-- Modifier options will be rendered here -->
          </div>
        </div>
      </div>

      <div class="p-6 bg-gray-50 border-t border-gray-200 sticky bottom-0">
        <button
          onclick="saveModifierGroup()"
          class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-6 rounded-lg transition"
        >
          Save Modifier Group
        </button>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="fixed bottom-4 right-4 z-[200] hidden">
    <div id="toastContent" class="bg-gray-900 text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-3">
      <span id="toastMessage"></span>
    </div>
  </div>

  <script src="../shared/token-manager.js"></script>
  <script src="api-manager.js"></script>
  <script src="demo-data.js"></script>
  <script src="data-manager.js"></script>
  <script src="ui-components.js"></script>
  <script src="event-handlers.js"></script>
  <script>
    // Initialize application
    document.addEventListener('DOMContentLoaded', () => {
      initializeApp();
    });
  </script>
</body>
</html>
