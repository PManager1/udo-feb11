<!DOCTYPE html>
<html>
  <head>
    <title>DC McDonald's Map with NW Zone</title>
    <style>
      #map { height: 600px; width: 100%; border-radius: 8px; }
      body { font-family: sans-serif; padding: 20px; }
    </style>
  </head>
  <body>
    <h3>McDonald's Locations & NW District Zone</h3>
    <div id="map"></div>

    <script src="/assets/js/config.js"></script>
    <script>
      function initMap() {
        // Center of DC
        const dcCenter = { lat: 38.8997, lng: -77.0365 };
        
        const map = new google.maps.Map(document.getElementById("map"), {
          zoom: 12,
          center: dcCenter,
        });

        // 1. ADD THE CIRCLE (NW Area)
        const nwCircle = new google.maps.Circle({
          strokeColor: "#FF0000",   // Red border
          strokeOpacity: 0.8,
          strokeWeight: 2,
          fillColor: "#FF0000",     // Red fill
          fillOpacity: 0.15,        // Lightly transparent
          map: map,
          center: { lat: 38.9200, lng: -77.0500 }, // Shifted slightly NW
          radius: 4000,             // Radius in meters (approx 2.5 miles)
        });

        // 2. ADD THE MARKERS
        const locations = [
          { label: "New York Ave", pos: { lat: 38.9011, lng: -77.0287 } },
          { label: "17th St NW", pos: { lat: 38.8997, lng: -77.0396 } },
          { label: "400 C St SW", pos: { lat: 38.8861, lng: -77.0182 } },
          { label: "Marion Barry Ave", pos: { lat: 38.8631, lng: -76.9748 } }
        ];

        locations.forEach(location => {
          new google.maps.Marker({
            position: location.pos,
            map: map,
            title: location.label
          });
        });
      }

      // Load Google Maps API with the key from config.js
      function loadGoogleMaps() {
        const script = document.createElement('script');
        script.src = 'https://maps.googleapis.com/maps/api/js?key=' + GOOGLE_MAPS_API_KEY + '&callback=initMap';
        script.async = true;
        script.defer = true;
        document.head.appendChild(script);
      }

      // Load the script when page loads
      window.addEventListener('DOMContentLoaded', loadGoogleMaps);
    </script>
  </body>
</html>
